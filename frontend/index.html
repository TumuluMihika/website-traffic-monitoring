<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website Traffic Monitoring Dashboard</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<h1>Website Traffic Monitoring Dashboard</h1>

<div class="container">

    <!-- Upload Section -->
    <div class="card upload-section">
        <input type="file" id="fileInput" accept=".csv">
        <button onclick="uploadAndDetect()">Upload & Detect</button>
    </div>

    <!-- Stats Section -->
    <div class="card stats">
        <div class="stat-box">
            <h2 id="anomalyCount">0</h2>
            <p>Anomalies Detected</p>
        </div>

        <div class="stat-box">
            <h2 id="forecastDays">60</h2>
            <p>Forecast Days</p>
        </div>

        <div class="stat-box">
            <h2 id="modelType">SARIMA</h2>
            <p>Model Used</p>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="card">
        <div id="chartContainer">

            <!-- Placeholder -->
            <div id="placeholder" class="chart-placeholder">
                📁 Upload a CSV file and click 
                <strong>Upload & Detect</strong> 
                to visualize traffic data
            </div>

            <!-- Chart Area -->
            <div id="chartArea" style="display:none;">
                <div class="chart-wrapper">
                    <canvas id="chart"></canvas>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- JS File -->
<script src="app.js"></script>

</body>
</html>
